# -----------------------------------------------------
# KEYBINDINGS :: TITAN CLUSTER
# -----------------------------------------------------

$mainMod = SUPER

# ──────────────────────────────────────────────────────────────────────────────
#  CLUSTER 1: THE LAUNCHPAD (Top Left: Q-E-R)
# ──────────────────────────────────────────────────────────────────────────────
bind = $mainMod, Q, exec, $terminal       # Q = Terminal
bind = $mainMod, E, exec, $fileManager    # E = Explorer
bind = $mainMod, R, exec, $menu           # R = Run (Rofi)

# ──────────────────────────────────────────────────────────────────────────────
#  CLUSTER 2: THE BUCKETS (Home Row: A-S-D-F-G)
#  "Left hand controls the workspace."
# ──────────────────────────────────────────────────────────────────────────────
# S = Standard (VPN, System Tools)
bind = $mainMod, S, togglespecialworkspace, standard
bind = $mainMod SHIFT, S, movetoworkspace, special:standard

# W = Work (Coding, Docs)
bind = $mainMod, W, togglespecialworkspace, work
bind = $mainMod SHIFT, W, movetoworkspace, special:work

# D = Discord/Hobby (Music, Social)
bind = $mainMod, H, togglespecialworkspace, hobby
bind = $mainMod SHIFT, H, movetoworkspace, special:hobby

# G = Gaming (Steam, Heroic)
bind = $mainMod, G, togglespecialworkspace, gaming
bind = $mainMod SHIFT, G, movetoworkspace, special:gaming

# T = Tools (Monitoring, Utilities)
bind = $mainMod, T, togglespecialworkspace, tools
bind = $mainMod SHIFT, T, movetoworkspace, special:tools
# ──────────────────────────────────────────────────────────────────────────────
#  CLUSTER 3: WINDOW STATE (Bottom Left: Z-X-C-V)
# ──────────────────────────────────────────────────────────────────────────────
bind = $mainMod, C, killactive,           # C = Close
bind = $mainMod, V, togglefloating,       # V = Float
bind = $mainMod, F, fullscreen,           # F = Fullscreen
bind = $mainMod, P, pseudo,               # P = Pseudo
bind = $mainMod, J, togglesplit,          # J = Join/Split

# ──────────────────────────────────────────────────────────────────────────────
#  CLUSTER 4: SYSTEM (Protected / Right Hand)
# ──────────────────────────────────────────────────────────────────────────────
bind = $mainMod, L, exec, hyprlock
bind = $mainMod SHIFT, L, exec, wlogout
bind = CTRL SHIFT, S, exec, ~/.config/hypr/scripts/screenshot-swappy.sh
bind = , Print, exec, grim -g "$(slurp)" - | wl-copy
bind = $mainMod SHIFT, V, exec, ~/.config/hypr/scripts/cliphist-rofi.sh
bind = $mainMod, N, exec, swaync-client -t -sw  # N = "Notifications"

# ──────────────────────────────────────────────────────────────────────────────
#  CLUSTER 5: NAVIGATION (Arrows & Standard 1-10)
# ──────────────────────────────────────────────────────────────────────────────
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# ──────────────────────────────────────────────────────────────────────────────
#  CLUSTER 6: EXPANDED WORKSPACES (F1-F12 -> 11-22)
# ──────────────────────────────────────────────────────────────────────────────
bind = $mainMod, F1, workspace, 11
bind = $mainMod, F2, workspace, 12
bind = $mainMod, F3, workspace, 13
bind = $mainMod, F4, workspace, 14
bind = $mainMod, F5, workspace, 15
bind = $mainMod, F6, workspace, 16
bind = $mainMod, F7, workspace, 17
bind = $mainMod, F8, workspace, 18
bind = $mainMod, F9, workspace, 19
bind = $mainMod, F10, workspace, 20
bind = $mainMod, F11, workspace, 21
bind = $mainMod, F12, workspace, 22

bind = $mainMod SHIFT, F1, movetoworkspace, 11
bind = $mainMod SHIFT, F2, movetoworkspace, 12
bind = $mainMod SHIFT, F3, movetoworkspace, 13
bind = $mainMod SHIFT, F4, movetoworkspace, 14
bind = $mainMod SHIFT, F5, movetoworkspace, 15
bind = $mainMod SHIFT, F6, movetoworkspace, 16
bind = $mainMod SHIFT, F7, movetoworkspace, 17
bind = $mainMod SHIFT, F8, movetoworkspace, 18
bind = $mainMod SHIFT, F9, movetoworkspace, 19
bind = $mainMod SHIFT, F10, movetoworkspace, 20
bind = $mainMod SHIFT, F11, movetoworkspace, 21
bind = $mainMod SHIFT, F12, movetoworkspace, 22

# ──────────────────────────────────────────────────────────────────────────────
#  MEDIA (Function Keys / Hardware)
# ──────────────────────────────────────────────────────────────────────────────
bind = $mainMod, I, exec, ~/.config/swaync/scripts/mic.sh up
bind = $mainMod, O, exec, ~/.config/swaync/scripts/mic.sh down
bindl =, XF86AudioMicMute, exec, ~/.config/swaync/scripts/mic.sh toggle
bindel = , XF86AudioRaiseVolume, exec, ~/.config/swaync/scripts/volume.sh up
bindel = , XF86AudioLowerVolume, exec, ~/.config/swaync/scripts/volume.sh down
bindl = , XF86AudioMute, exec, ~/.config/swaync/scripts/volume.sh toggle
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

# Mouse
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow