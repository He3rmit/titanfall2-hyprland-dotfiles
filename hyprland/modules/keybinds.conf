# -----------------------------------------------------
# KEYBINDINGS :: TITAN CLUSTER
# -----------------------------------------------------

$mainMod = SUPER

# ──────────────────────────────────────────────────────────────────────────────
#  CLUSTER 1: THE LAUNCHPAD (Top Left: Q-E-R)
# ──────────────────────────────────────────────────────────────────────────────
bind = $mainMod, Q, exec, $terminal       # Q = Terminal
bind = $mainMod, E, exec, $fileManager    # E = Explorer
bind = $mainMod, R, exec, $menu           # R = App Launcher (drun only)
bind = $mainMod CTRL, R, exec, $runner   # CTRL+R = Raw Command Runner
# bind = , XF86Launch1, exec, rofi -show drun

# W = Wallpaper Selector
bind = $mainMod ALT, W, exec, ~/.config/hypr/scripts/wallpaper-selector.sh
# E = Effects Menu
bind = $mainMod ALT, E, exec, ~/.config/hypr/scripts/wallpaper-effects.sh

# ──────────────────────────────────────────────────────────────────────────────
#  CLUSTER 2: THE BUCKETS (Home Row: A-S-D-F-G)
#  "Left hand controls the workspace."
# ──────────────────────────────────────────────────────────────────────────────
# S = Standard (code:39)
bind = $mainMod, code:39, togglespecialworkspace, standard
bind = $mainMod SHIFT, code:39, movetoworkspace, special:standard

# W = Work (code:25)
bind = $mainMod, code:25, togglespecialworkspace, work
bind = $mainMod SHIFT, code:25, movetoworkspace, special:work

# H = Hobby (code:43)
bind = $mainMod, code:43, togglespecialworkspace, hobby
bind = $mainMod SHIFT, code:43, movetoworkspace, special:hobby

# G = Gaming (code:42)
bind = $mainMod, code:42, togglespecialworkspace, gaming
bind = $mainMod SHIFT, code:42, movetoworkspace, special:gaming

# T = Tools (code:28)
bind = $mainMod, code:28, togglespecialworkspace, tools
bind = $mainMod SHIFT, code:28, movetoworkspace, special:tools
# ──────────────────────────────────────────────────────────────────────────────
#  CLUSTER 3: WINDOW STATE (Bottom Left: Z-X-C-V)
# ──────────────────────────────────────────────────────────────────────────────
bind = $mainMod, C, killactive           # C = Close
bind = $mainMod, V, togglefloating       # V = Float
bind = $mainMod, F, fullscreen           # F = Fullscreen
bind = $mainMod, P, pseudo               # P = Pseudo
bind = $mainMod, J, layoutmsg, togglesplit # J = Join/Split

# ──────────────────────────────────────────────────────────────────────────────
#  CLUSTER 4: SYSTEM (Protected / Right Hand)
# ──────────────────────────────────────────────────────────────────────────────
bind = $mainMod, L, exec, hyprlock
bind = , XF86PowerOff, exec, wlogout
bind = CTRL SHIFT, S, exec, ~/.config/hypr/scripts/screenshot-swappy.sh
bind = , Print, exec, grim - | wl-copy
bind = $mainMod SHIFT, V, exec, ~/.config/hypr/scripts/cliphist-rofi.sh
bind = $mainMod, N, exec, swaync-client -t -sw  # N = "Notifications"
bind = $mainMod, B, exec, ~/.config/waybar/scripts/power_cycle.sh
bind = $mainMod ALT, B, exec, ~/.config/hypr/scripts/waybar-switcher.sh  # Alt+B = UI Switcher
bind = , XF86TouchpadToggle, exec, ~/.config/hypr/scripts/touchpad-toggle.sh
# ──────────────────────────────────────────────────────────────────────────────
#  CLUSTER 5: NAVIGATION (Arrows & Standard 1-10)
# ──────────────────────────────────────────────────────────────────────────────
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

bind = $mainMod, code:10, workspace, 1
bind = $mainMod, code:11, workspace, 2
bind = $mainMod, code:12, workspace, 3
bind = $mainMod, code:13, workspace, 4
bind = $mainMod, code:14, workspace, 5
bind = $mainMod, code:15, workspace, 6
bind = $mainMod, code:16, workspace, 7
bind = $mainMod, code:17, workspace, 8
bind = $mainMod, code:18, workspace, 9
bind = $mainMod, code:19, workspace, 10

bind = $mainMod SHIFT, code:10, movetoworkspace, 1
bind = $mainMod SHIFT, code:11, movetoworkspace, 2
bind = $mainMod SHIFT, code:12, movetoworkspace, 3
bind = $mainMod SHIFT, code:13, movetoworkspace, 4
bind = $mainMod SHIFT, code:14, movetoworkspace, 5
bind = $mainMod SHIFT, code:15, movetoworkspace, 6
bind = $mainMod SHIFT, code:16, movetoworkspace, 7
bind = $mainMod SHIFT, code:17, movetoworkspace, 8
bind = $mainMod SHIFT, code:18, movetoworkspace, 9
bind = $mainMod SHIFT, code:19, movetoworkspace, 10

# ──────────────────────────────────────────────────────────────────────────────
#  CLUSTER 6: EXPANDED WORKSPACES (F1-F12 -> 11-22)
# ──────────────────────────────────────────────────────────────────────────────
bind = $mainMod, F1, workspace, 11
bind = $mainMod, F2, workspace, 12
bind = $mainMod, F3, workspace, 13
bind = $mainMod, F4, workspace, 14
bind = $mainMod, F5, workspace, 15
bind = $mainMod, F6, workspace, 16
bind = $mainMod, F7, workspace, 17
bind = $mainMod, F8, workspace, 18
bind = $mainMod, F9, workspace, 19
bind = $mainMod, F10, workspace, 20
bind = $mainMod, F11, workspace, 21
bind = $mainMod, F12, workspace, 22

bind = $mainMod SHIFT, F1, movetoworkspace, 11
bind = $mainMod SHIFT, F2, movetoworkspace, 12
bind = $mainMod SHIFT, F3, movetoworkspace, 13
bind = $mainMod SHIFT, F4, movetoworkspace, 14
bind = $mainMod SHIFT, F5, movetoworkspace, 15
bind = $mainMod SHIFT, F6, movetoworkspace, 16
bind = $mainMod SHIFT, F7, movetoworkspace, 17
bind = $mainMod SHIFT, F8, movetoworkspace, 18
bind = $mainMod SHIFT, F9, movetoworkspace, 19
bind = $mainMod SHIFT, F10, movetoworkspace, 20
bind = $mainMod SHIFT, F11, movetoworkspace, 21
bind = $mainMod SHIFT, F12, movetoworkspace, 22

# ──────────────────────────────────────────────────────────────────────────────
#  MEDIA (Function Keys / Hardware)
# ──────────────────────────────────────────────────────────────────────────────
bindel = , XF86AudioRaiseVolume, exec, ~/.config/swaync/scripts/volume.sh up
bindel = , XF86AudioLowerVolume, exec, ~/.config/swaync/scripts/volume.sh down
bindl = , XF86AudioMute, exec, ~/.config/swaync/scripts/volume.sh toggle
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

# Mouse
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
# ──────────────────────────────────────────────────────────────────────────────
#  CLUSTER 7: USER CUSTOMIZATION
#  Load any host-specific keybinds or overrides here.
# ──────────────────────────────────────────────────────────────────────────────
source = ~/.config/hypr/user-keybinds.conf