# Load nwg-displays configuration (overrides previous settings. NOTE: ONE TIME USE ONLY
# Comment out the source monitors and workspaces after setting up nwg-displays
# Recommended to rely on hyprland's monitor configuration

#source = ~/.config/hypr/monitors.conf
#source = ~/.config/hypr/workspaces.conf

source = ~/.config/hypr/host.conf

# #######################################################################################
# AUTOGENERATED HYPRLAND CONFIG.
# EDIT THIS CONFIG ACCORDING TO THE WIKI INSTRUCTIONS.
# #######################################################################################

#autogenerated = 1 # remove this line to remove the warning

# This is an example Hyprland config file.
# Refer to the wiki for more information.
# https://wiki.hypr.land/Configuring/

# Please note not all available settings / options are set here.
# For a full list, see the wiki

# You can split this configuration into multiple files
# Create your files separately and then link them to this file like this:
# source = ~/.config/hypr/myColors.conf


#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hypr.land/Configuring/Environment-variables/

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

# 1. Force apps to use Wayland
env = GDK_BACKEND,wayland,x11,*
env = QT_QPA_PLATFORM,wayland;xcb
env = SDL_VIDEODRIVER,wayland
env = CLUTTER_BACKEND,wayland

# 2. Tell the system it's Hyprland
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland

# 3. Populate the "open with $fileManager from dolphin"
env = XDG_MENU_PREFIX,arch- 


################
### MONITORS ###
################

# See https://wiki.hypr.land/Configuring/Monitors/

###################
### MY PROGRAMS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/

# Set programs that you use
$terminal = kitty
$fileManager = dolphin
$menu =  rofi -show drun


#################
### AUTOSTART ###
#################

# 1. The "Wayland Bridge" (Essential for Screen Share & Session Stability)
# Moved to the top to ensure D-Bus is ready before anything else starts
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

# 2. System Plumbing (Audio, Notifications, Idle, etc) 
exec-once = swaync
exec-once = hypridle
exec-once = hyprsunset
exec-once = kbuildsycoca6

# 3. Polkit Agent & Keyring (The "Secret Service" for VS Code/Bluetooth)
exec-once = /usr/lib/polkit-kde-authentication-agent-1
exec-once = /usr/lib/pam_kwallet_init

# 4. Clipboard Manager
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# 5. Titanfall Scripts
exec-once = ~/.config/hypr/scripts/xhost-root.sh
exec-once = ~/.config/wallpapers/mpvpaper-pool.sh

# 6. Status Bar
exec-once = killall waybar; waybar

# --- Section 7: Peripherals & Programs ---
exec-once = arch-update --tray &
exec-once = sleep 3 && protonvpn-app --start-minimized &
exec-once = easyeffects --service-mode -w &
exec-once = steam -silent &
exec-once = heroic --no-gui &

# The Bluetooth Handshake (Removed the rfkill block to let the system remember)
exec-once = sleep 2 && blueman-applet &

# --- Section 8: Audio Wake Fixes ---
exec-once = sh -c "pavucontrol & sleep 2; killall pavucontrol" &
exec-once = sleep 4 && wpctl status > /dev/null && wpctl set-mute @DEFAULT_AUDIO_SOURCE@ 0

