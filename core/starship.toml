# TITANFALL 2 STARSHIP THEME
# --------------------------

format = """
[в–‘в–’в–“](#00e0ff)\
[ оһ• ](bg:#00e0ff fg:#090a0a)\
[оӮҙ](bg:#1a1b1d fg:#00e0ff)\
$directory\
[оӮҙ](fg:#1a1b1d bg:#2b2c2f)\
$git_branch\
$git_status\
[оӮҙ](fg:#2b2c2f bg:#1a1b1d)\
$nodejs\
$rust\
$golang\
$php\
[оӮҙ](fg:#1a1b1d)\
\n$character"""

[directory]
style = "bg:#1a1b1d fg:#00e0ff"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "вҖҰ/"

[directory.substitutions]
"Documents" = "пңҳ "
"Downloads" = "пҖҷ "
"Music" = "пҖҒ "
"Pictures" = "пҖҫ "

[git_branch]
symbol = "пҗҳ"
style = "bg:#2b2c2f"
format = "[[ $symbol $branch ](fg:#00e0ff bg:#2b2c2f)]($style)"

[git_status]
style = "bg:#2b2c2f"
format = "[[($all_status$ahead_behind )](fg:#00e0ff bg:#2b2c2f)]($style)"

[nodejs]
symbol = "оңҳ"
style = "bg:#1a1b1d"
format = "[[ $symbol ($version) ](fg:#769ff0 bg:#1a1b1d)]($style)"

[rust]
symbol = "оһЁ"
style = "bg:#1a1b1d"
format = "[[ $symbol ($version) ](fg:#769ff0 bg:#1a1b1d)]($style)"

[golang]
symbol = "пі‘"
style = "bg:#1a1b1d"
format = "[[ $symbol ($version) ](fg:#769ff0 bg:#1a1b1d)]($style)"

[php]
symbol = "оҳҲ"
style = "bg:#1a1b1d"
format = "[[ $symbol ($version) ](fg:#769ff0 bg:#1a1b1d)]($style)"

[time]
disabled = false
time_format = "%R" # Hour:Minute Format
style = "bg:#1d2230"
format = "[[ пҗә $time ](fg:#a0a9cb bg:#1d2230)]($style)"

[character]
success_symbol = "[вһң](bold #00ff99)"
error_symbol = "[вң—](bold #ff3b3b)"