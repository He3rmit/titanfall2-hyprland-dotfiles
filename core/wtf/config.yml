wtf:
  colors:
    background: "black"
    border:
      focusable: "darkslateblue"
      focused: "deepskyblue"
      normal: "darkslategray"
    highlight:
      fore: "black"
      back: "deepskyblue"
    text: "lightcyan"
    title: "deepskyblue"
  grid:
    # How the HUD is divided (columns x rows)
    # Two fixed columns + one flexible right column for git
    columns: [40, 40, -1]
    # Top row tall (CPU bars), middle compact (clock/signal), bottom medium
    rows: [12, 6, 8]
  refreshInterval: 1
  term: "xterm-256color"

  mods:
    # --- PILOT STATUS (System Resources) ---
    resourceusage:
      enabled: true
      focusable: true
      title: "📊 Core Link"
      position:
        top: 0
        left: 0
        height: 2
        width: 1
      refreshInterval: 1
      type: "resourceusage"

    # --- CHRONO (Time & Date) ---
    clocks:
      colors:
        rows:
          even: "deepskyblue"
          odd: "lightcyan"
      enabled: true
      focusable: true
      position:
        top: 0
        left: 1
        height: 1
        width: 1
      locations:
        Local: "Asia/Manila"
      refreshInterval: 15
      sort: "alphabetical"
      title: "🕒 Chrono Sync"
      type: "clocks"

    # --- COMMS (Git Status for your Dotfiles) ---
    git:
      branchInTitle: true
      commitCount: 5
      commitFormat: "[deepskyblue]%h [gray]%cd [white]%s [darkgray]%an[white]"
      dateFormat: "%H:%M %d %b %y"
      enabled: true
      focusable: true
      position:
        top: 0
        left: 2
        height: 3
        width: 1
      refreshInterval: 30
      repositories:
        - "/home/rexsm/dotfiles"
      title: "📁 Data Core"
      type: "git"

    # --- ENVIRONMENT (Weather) ---
    weather:
      # Requires WTF_OWM_API_KEY env var to be set
      # Get a free key at https://openweathermap.org/api
      colors:
        current: "deepskyblue"
      enabled: true
      focusable: true
      position:
        top: 2
        left: 0
        height: 1
        width: 1
      cityCode: 1715430
      title: "🌤️ Atmosphere"
      type: "weather"
      unit: "c"

    # --- POWER LINE (Custom Shell Module) ---
    cmdrunner:
      cmd: "zsh"
      args: ["-c", "nmcli device status | grep connected | head -n 1"]
      enabled: true
      focusable: true
      position:
        top: 1
        left: 1
        height: 1
        width: 1
      title: "📡 Signal Strength"
      refreshInterval: 60
      type: "cmdrunner"

    # --- SECURITY (System Info) ---
    security:
      enabled: true
      focusable: true
      position:
        top: 2
        left: 1
        height: 1
        width: 1
      refreshInterval: 3600
      title: "💻 Chassis Info"
      type: "security"
