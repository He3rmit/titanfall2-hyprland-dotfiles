# TITANFALL KITTY THEME
# ---------------------

# 1. Fonts (JetBrains Mono is recommended for the icons)
font_family      ShureTechMono Nerd Font
italic_font      auto
bold_italic_font auto

# (Optional: Adjust line height if it feels too cramped)
modify_font cell_height 110%

# 2. Window Layout
window_padding_width 10
hide_window_decorations yes
confirm_os_window_close 0

# 3. Colors (Titanfall Palette)
foreground #00e0ff
background #090a0a
selection_foreground #090a0a
selection_background #00e0ff
url_color #00ff99
cursor #00e0ff

# Black
color0 #1a1b1d
color8 #2b2c2f

# Red (Error)
color1 #ff3b3b
color9 #ff5c5c

# Green (Success)
color2 #00ff99
color10 #33ffcc

# Yellow
color3 #f1c40f
color11 #f39c12

# Blue (UI)
color4 #00e0ff
color12 #33ccff

# Magenta
color5 #9c27b0
color13 #ba68c8

# Cyan
color6 #00bcd4
color14 #26c6da

# White
color7 #e0e0e0
color15 #ffffff

# 4. Host Specific Settings (Font Size)
# This file doesn't exist yet! The install script creates it.
include host.conf