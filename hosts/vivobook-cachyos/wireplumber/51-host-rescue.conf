monitor.alsa.rules = [
  # 1. THE PROFILE ENFORCER: Force Tiger Lake into Pro Audio mode
  {
    matches = [{ device.name = "~alsa_card.pci-.*.intel.*sst.*" }],
    actions = { update-props = { device.profile = "pro-audio" } }
  },
  # 2. THE HOSTAGE RESCUE: Secure Pro 7 (Internal Mic)
  {
    matches = [{ node.name = "~alsa_input.pci-.*.pro-input-7" }],
    actions = {
      update-props = {
        priority.driver = 2000,
        priority.session = 2000,
        node.nick = "Internal Microphone (Default)"
      }
    }
  },
  # 3. THE GHOST EXORCIST: Disable Pro 6 and HDMI/Pro outputs
  {
    matches = [
      { node.name = "~alsa_output.pci-.*.pro-output-.*" },
      { node.name = "~alsa_input.pci-.*.pro-input-6" },
      { node.name = "~alsa_input.usb-.*C-Media.*" }
    ],
    actions = { update-props = { node.disabled = true, priority.session = 1, priority.driver = 1 } }
  }
]
