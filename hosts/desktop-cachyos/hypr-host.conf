# DESKTOP SPECIFIC CONFIG
# -----------------------

# 1. Monitor: Define your specific desktop screens here
# Uncomment and adjust for your setup:
# monitor = DP-1, preferred, auto, 1
# monitor = HDMI-A-1, 1920x1080@60, 1920x0, 1

# 2. Input: Mouse settings (No touchpad, no natural scroll)
input {
    kb_layout = us
    follow_mouse = 1
    numlock_by_default = true

    touchpad {
        natural_scroll = false
    }

    sensitivity = 0
}

