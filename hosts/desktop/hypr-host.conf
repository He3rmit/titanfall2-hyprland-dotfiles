# DESKTOP SPECIFIC CONFIG
# -----------------------

# 1. Monitor: Define your specific desktop screens here
# (Run 'hyprctl monitors' on your desktop to get the real names like DP-1)
# monitor = DP-1, preferred, auto, 1
# monitor = HDMI-A-1, 1920x1080@60, 2560x0, 1

# 2. Input: Mouse settings (No natural scroll)
input {
    kb_layout = us
    follow_mouse = 1
    touchpad {
        natural_scroll = false
    }
}

