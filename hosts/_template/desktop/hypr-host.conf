# DESKTOP SPECIFIC CONFIG — Template
# ----------------------
# Customize the monitor line to match your display(s).
# Run `hyprctl monitors all` to find your monitor name and resolution.

# 1. Monitor: Auto-detect (safe default for single monitor)
monitor=,preferred,auto,auto

# 2. Input: Standard keyboard + mouse
input {
    kb_layout = us
    follow_mouse = 1
    numlock_by_default = true
    accel_profile = adaptive
    sensitivity = 0
}
