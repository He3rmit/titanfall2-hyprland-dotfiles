# Alacritty Configuration — Titanfall 2 Theme
# Cleaned-up, fully working TOML

[window]
# Window opacity (0.0 fully transparent, 1.0 opaque)
opacity = 0.88

# Padding around terminal content
padding.x = 5
padding.y = 5

# Window decorations: "none", "full", or "transparent"
decorations = "full"

[font]
# Font family and size
normal.family = "Audiowide"
normal.style = "Regular"
size = 8

[colors]
# Background and foreground (text) colors
primary.background = "#0d0d0d"
primary.foreground = "#e0e0e0"

[colors.normal]
black   = "#0d0d0d"
red     = "#ff5555"
green   = "#50fa7b"
yellow  = "#f1fa8c"
blue    = "#bd93f9"
magenta = "#ff79c6"
cyan    = "#8be9fd"
white   = "#bbbbbb"

[colors.bright]
black   = "#555555"
red     = "#ff8c42"
green   = "#69ff94"
yellow  = "#ffda5c"
blue    = "#a3a0ff"
magenta = "#ff92df"
cyan    = "#a4ffff"
white   = "#ffffff"

[scrolling]
# Scrollback lines
history = 10000
multiplier = 3
